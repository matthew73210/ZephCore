# Heltec Wireless Tracker (V1.1) — ESP32-S3-FN8 + SX1262 + ST7735R 160x80 TFT + GPS
#
# Hardware:
#   ESP32-S3-FN8 (8MB embedded flash)
#   SX1262 LoRa on SPI2 (DIO2 as RF switch, external TCXO 1.8V)
#   ST7735R 1.14" 160x80 colour TFT on SPI3 (backlight on GPIO21)
#   GPS (gnss-nmea-generic) on UART2 (TX=GPIO34, RX=GPIO33), 115200 baud
#   GPS run/enable GPIO35 (active HIGH); GPS powered by the Vext rail (GPIO3)
#   Battery ADC: GPIO1 = ADC1 ch0 (&adc0), divider enable GPIO2 (active HIGH)
#   Status LED GPIO18 (led0); user button GPIO0
#
# Include order: prj.conf → zephcore_common.conf → esp32_common.conf → board.conf

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="Heltec Tracker"
CONFIG_BT_DIS_MODEL_NUMBER_STR="Heltec Wireless Tracker"

# Flash size — ESP32-S3-FN8 = 8 MB
CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y

# BLE — override esp32_common.conf BT_PRIVACY=y.  The Android companion app
# requires a stable public address; RPA breaks the app pairing flow.
CONFIG_BT_PRIVACY=n
